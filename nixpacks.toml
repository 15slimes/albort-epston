[phases.setup]
nixPkgs = ["nodejs_22", "ffmpeg", "python3", "python3Packages.pip"]

[phases.install]
cmds = [
  "ln -s $(which python3) /usr/local/bin/python",
  "python3 -m pip install -U yt-dlp --break-system-packages",
  "npm install --ignore-scripts"
]

[start]
cmd = "node index.js"
